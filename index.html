<style>
:root {
  --airbnb: #FF5A5F;
  --booking: #003B95;
  --gold: #D4AF37;
  --bg: #F7F6F3;
  --card: #FFFFFF;
  --text: #1A1A1A;
  --text2: #888;
  --text3: #BBB;
  --border: rgba(0,0,0,0.08);
  --radius: 16px;
  --success: #2D9B6F;
  --success-bg: #EAF5EF;
  --warn: #C47D00;
  --warn-bg: #FFF5E0;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{font-family:'DM Sans',-apple-system,sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column;max-width:480px;margin:0 auto;}

#splash{position:fixed;inset:0;z-index:9999;background:#1A1A1A;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity 0.5s;}
#splash.hide{opacity:0;pointer-events:none;}
.splash-logo{width:80px;height:80px;border-radius:20px;margin-bottom:20px;}
.splash-title{font-size:24px;font-weight:600;color:white;letter-spacing:0.15em;}
.splash-sub{font-size:13px;color:var(--gold);margin-top:6px;letter-spacing:0.08em;}
.splash-loader{margin-top:40px;display:flex;gap:6px;}
.splash-dot{width:6px;height:6px;border-radius:50%;background:var(--gold);animation:sdot 1.2s infinite;}
.splash-dot:nth-child(2){animation-delay:0.2s;}
.splash-dot:nth-child(3){animation-delay:0.4s;}
@keyframes sdot{0%,80%,100%{opacity:0.2}40%{opacity:1}}

.topbar{background:#1A1A1A;padding:52px 20px 14px;flex-shrink:0;}
.topbar-inner{display:flex;align-items:center;justify-content:space-between;}
.topbar-brand{display:flex;align-items:center;gap:10px;}
.topbar-logo{width:32px;height:32px;border-radius:8px;}
.topbar-name{font-size:16px;font-weight:600;color:white;letter-spacing:0.05em;}
.topbar-sub{font-size:11px;color:var(--gold);margin-top:1px;}
.sync-pill{display:flex;align-items:center;gap:5px;background:rgba(255,255,255,0.1);border-radius:20px;padding:5px 12px;cursor:pointer;}
.sync-dot{width:6px;height:6px;border-radius:50%;background:#4CAF50;}
.sync-dot.syncing{background:var(--gold);animation:blink 1s infinite;}
.sync-dot.error{background:#FF5A5F;}
.sync-text{font-size:11px;color:rgba(255,255,255,0.7);}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}

.scroll-area{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px 16px calc(80px + var(--safe-bottom));}
.section{display:none;animation:fadeIn 0.2s;}
.section.active{display:block;}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:white;border-top:1px solid var(--border);display:flex;padding-bottom:var(--safe-bottom);z-index:100;box-shadow:0 -4px 20px rgba(0,0,0,0.06);}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 4px 8px;cursor:pointer;color:var(--text3);}
.nav-item.active{color:#1A1A1A;}
.nav-icon{font-size:22px;line-height:1;margin-bottom:3px;}
.nav-label{font-size:10px;font-weight:500;}
.nav-item.active .nav-label{font-weight:600;}

.loading{text-align:center;padding:60px 20px;}
.spinner{width:32px;height:32px;border:2.5px solid var(--border);border-top-color:#1A1A1A;border-radius:50%;animation:spin 0.7s linear infinite;margin:0 auto 14px;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading p{font-size:13px;color:var(--text2);}
.loading small{font-size:11px;color:var(--text3);display:block;margin-top:8px;}

.error-box{background:#FFF0F0;border:1px solid rgba(255,90,95,0.2);border-radius:12px;padding:14px;font-size:13px;color:#CC2222;margin-bottom:12px;line-height:1.5;}
.warn-box{background:var(--warn-bg);border:1px solid rgba(196,125,0,0.2);border-radius:12px;padding:14px;font-size:13px;color:var(--warn);margin-bottom:12px;line-height:1.5;}
.retry-btn{display:block;width:100%;margin-top:10px;padding:10px;background:#1A1A1A;color:white;border:none;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;}

.section-title{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:0.08em;margin:20px 0 10px;}
.section-title:first-child{margin-top:0;}

.menage-header{background:#1A1A1A;border-radius:var(--radius);padding:18px 20px;margin-bottom:14px;display:flex;align-items:center;gap:14px;}
.menage-icon{font-size:32px;}
.menage-header h2{font-size:16px;font-weight:600;color:white;}
.menage-header p{font-size:12px;color:rgba(255,255,255,0.5);margin-top:3px;}

.task-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:10px;}
.task-date-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.task-date-label{font-size:13px;font-weight:600;}
.urgency{font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px;}
.urgency.today{background:#FFE8E8;color:#CC2222;}
.urgency.tomorrow{background:var(--warn-bg);color:var(--warn);}
.urgency.soon{background:#EEF2FF;color:#4F5BD5;}
.urgency.ok{background:var(--success-bg);color:var(--success);}
.task-row{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-top:1px solid var(--border);}
.task-type{font-size:10px;font-weight:700;padding:3px 8px;border-radius:5px;letter-spacing:0.05em;flex-shrink:0;margin-top:2px;}
.task-type.out{background:#FFE8E8;color:#CC2222;}
.task-type.in{background:#E8F0FF;color:var(--booking);}
.task-name{font-size:14px;font-weight:600;}
.task-detail{font-size:12px;color:var(--text2);margin-top:2px;}
.task-plat{font-size:11px;font-weight:600;margin-top:3px;}

.reserv-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:10px;}
.rv-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.rv-plat{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:600;}
.plat-dot{width:8px;height:8px;border-radius:50%;}
.rv-confirmed{font-size:11px;font-weight:500;padding:3px 9px;border-radius:20px;background:var(--success-bg);color:var(--success);}
.rv-name{font-size:17px;font-weight:600;margin-bottom:3px;}
.rv-nights{font-size:13px;color:var(--text2);}
.rv-dates{display:flex;margin-top:12px;border:1px solid var(--border);border-radius:10px;overflow:hidden;}
.rv-date{flex:1;padding:10px 12px;}
.rv-date:first-child{border-right:1px solid var(--border);}
.rv-date-lbl{font-size:10px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:4px;}
.rv-date-val{font-size:15px;font-weight:600;}
.rv-date-day{font-size:11px;color:var(--text2);margin-top:1px;}

.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.cal-btn{width:36px;height:36px;border-radius:50%;border:1px solid var(--border);background:var(--card);cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;color:var(--text2);}
.cal-month{font-size:16px;font-weight:600;}
.cal-legend{display:flex;gap:12px;margin-bottom:12px;flex-wrap:wrap;}
.leg{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text2);}
.leg-dot{width:9px;height:9px;border-radius:2px;}
.cal-wrap{background:var(--card);border-radius:var(--radius);padding:14px;border:1px solid var(--border);}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
.cal-dname{text-align:center;font-size:10px;font-weight:600;color:var(--text2);padding:0 0 8px;}
.cal-cell{aspect-ratio:1;border-radius:6px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:12px;font-weight:500;}
.cal-cell.today{background:#1A1A1A!important;color:white!important;font-weight:700;border-radius:50%;}
.cal-cell.past{opacity:0.28;}
.cal-cell.airbnb{background:#FFF0F0;color:#CC2222;}
.cal-cell.booking{background:#EEF2FF;color:var(--booking);}
.cal-cell.both{background:#F5F0FF;color:#5B4FCF;}
.cell-dot{width:4px;height:4px;border-radius:50%;margin-top:2px;}
.empty-state{text-align:center;padding:50px 20px;color:var(--text2);font-size:14px;line-height:1.6;}
</style>
</head>

<script>
const AIRBNB_URL = 'https://www.airbnb.fr/calendar/ical/1663980886187139384.ics?t=4d5885c92ddf442799a7228450482e29';
const BOOKING_URL = 'https://ical.booking.com/v1/export?t=2318d43e-e6a7-4771-a52a-75abe1b72fa9';

// Multiple CORS proxies — essaie dans l'ordre jusqu'à ce qu'un marche
const PROXIES = [
  url => `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`,
  url => `https://corsproxy.io/?${encodeURIComponent(url)}`,
  url => `https://api.codetabs.com/v1/proxy?quest=${url}`,
];

const MONTHS = ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
const DAYS_SHORT = ['L','M','M','J','V','S','D'];
const DAYS_FR = ['lundi','mardi','mercredi','jeudi','vendredi','samedi','dimanche'];

let STATE = { bookings:[], calMonth:new Date().getMonth(), calYear:new Date().getFullYear(), loaded:false };

// Essaie chaque proxy jusqu'à succès
async function fetchWithFallback(url) {
  let lastErr;
  for (const proxyFn of PROXIES) {
    try {
      const proxyUrl = proxyFn(url);
      const res = await fetch(proxyUrl, {signal: AbortSignal.timeout(8000)});
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json().catch(() => res.text().then(t => ({contents: t})));
      const text = data.contents || data;
      if (typeof text === 'string' && text.includes('BEGIN:VCALENDAR')) return text;
      throw new Error('Réponse iCal invalide');
    } catch(e) {
      lastErr = e;
      continue;
    }
  }
  throw new Error(lastErr?.message || 'Tous les proxies ont échoué');
}

function parseICS(text, platform) {
  const events = [];
  const blocks = text.split('BEGIN:VEVENT');
  for (let i = 1; i < blocks.length; i++) {
    const b = blocks[i];
    const get = k => { const m = b.match(new RegExp(k + '[^:]*:([^\r\n]+)')); return m ? m[1].trim() : ''; };
    const dtstart = get('DTSTART'), dtend = get('DTEND');
    const summary = get('SUMMARY'), status = get('STATUS');
    if (!dtstart || !dtend) continue;
    const skip = ['Not available','Airbnb (Not available)','Blocked','CLOSED','Unavailable'];
    if (skip.some(s => summary.includes(s))) continue;
    const pd = s => {
      const c = s.replace(/T.*/, '').replace(/-/g,'');
      if (c.length < 8) return null;
      return new Date(c.slice(0,4) + '-' + c.slice(4,6) + '-' + c.slice(6,8) + 'T12:00:00');
    };
    const ci = pd(dtstart), co = pd(dtend);
    if (!ci || !co || isNaN(ci) || isNaN(co)) continue;
    const nights = Math.round((co - ci) / 86400000);
    if (nights <= 0) continue;
    const name = summary || 'Réservation';
    events.push({ platform, name, ci: ci.toISOString().slice(0,10), co: co.toISOString().slice(0,10), nights, status: status === 'CANCELLED' ? 'cancelled' : 'confirmed' });
  }
  return events;
}

async function loadAll() {
  const dot = document.getElementById('sync-dot');
  const txt = document.getElementById('sync-text');
  dot.className = 'sync-dot syncing';
  txt.textContent = '…';
  document.getElementById('menage-content').innerHTML = '<div class="loading"><div class="spinner"></div><p>Connexion aux calendriers…</p><small>Peut prendre quelques secondes</small></div>';
  document.getElementById('reserv-content').innerHTML = '<div class="loading"><div class="spinner"></div><p>Chargement…</p></div>';

  let ab = [], bk = [], errors = [];

  try {
    const text = await fetchWithFallback(AIRBNB_URL);
    ab = parseICS(text, 'airbnb');
  } catch(e) { errors.push('Airbnb : ' + e.message); }

  try {
    const text = await fetchWithFallback(BOOKING_URL);
    bk = parseICS(text, 'booking');
  } catch(e) { errors.push('Booking : ' + e.message); }

  STATE.bookings = [...ab, ...bk].filter(b => b.status !== 'cancelled').sort((a,b) => new Date(a.ci) - new Date(b.ci));
  STATE.loaded = true;

  if (errors.length === 2) {
    dot.className = 'sync-dot error';
    txt.textContent = 'Erreur';
  } else {
    dot.className = 'sync-dot';
    txt.textContent = new Date().toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'});
  }

  renderMenage(errors);
  renderReservations(errors);
  renderCalendar();
  hideSplash();
}

function hideSplash() {
  const s = document.getElementById('splash');
  if (s) { s.classList.add('hide'); setTimeout(() => s.remove(), 600); }
}

function fmtDate(ds) {
  const d = new Date(ds + 'T12:00:00');
  return d.toLocaleDateString('fr-FR', {weekday:'long', day:'numeric', month:'long'});
}
function fmtShort(ds) {
  return new Date(ds + 'T12:00:00').toLocaleDateString('fr-FR', {day:'numeric', month:'short'});
}
function fmtDow(ds) {
  const d = new Date(ds + 'T12:00:00');
  return DAYS_FR[d.getDay() === 0 ? 6 : d.getDay() - 1];
}
function urgency(ds) {
  const today = new Date(); today.setHours(0,0,0,0);
  const diff = Math.round((new Date(ds + 'T12:00:00') - today) / 86400000);
  if (diff === 0) return {cls:'today', txt:"Aujourd'hui"};
  if (diff === 1) return {cls:'tomorrow', txt:'Demain'};
  if (diff <= 5) return {cls:'soon', txt:'Dans ' + diff + ' j'};
  return {cls:'ok', txt:'J+' + diff};
}

function renderMenage(errors=[]) {
  const today = new Date(); today.setHours(0,0,0,0);
  const in60 = new Date(today); in60.setDate(today.getDate() + 60);
  const tasks = {};
  STATE.bookings.forEach(b => {
    const coD = new Date(b.co + 'T12:00:00'), ciD = new Date(b.ci + 'T12:00:00');
    if (coD >= today && coD <= in60) { if (!tasks[b.co]) tasks[b.co]=[]; tasks[b.co].push({type:'out', b}); }
    if (ciD >= today && ciD <= in60) { if (!tasks[b.ci]) tasks[b.ci]=[]; tasks[b.ci].push({type:'in', b}); }
  });
  const dates = Object.keys(tasks).sort();
  let html = '';
  if (errors.length) {
    html += errors.map(e => `<div class="error-box">⚠️ ${e}<br><small>Vérifiez votre connexion internet</small></div>`).join('');
    if (errors.length < 2) html += `<div class="warn-box">⚠️ Données partielles — une plateforme est inaccessible</div>`;
  }
  if (dates.length === 0 && errors.length === 0) {
    html += '<div class="empty-state">✓ Aucun ménage prévu<br>dans les 60 prochains jours.</div>';
  } else {
    dates.forEach(ds => {
      const urg = urgency(ds), dl = fmtDate(ds);
      html += `<div class="task-card"><div class="task-date-row"><span class="task-date-label">${dl.charAt(0).toUpperCase()+dl.slice(1)}</span><span class="urgency ${urg.cls}">${urg.txt}</span></div>`;
      tasks[ds].forEach(t => {
        const {type, b} = t;
        const isOut = type === 'out';
        const pc = b.platform === 'airbnb' ? '#FF5A5F' : 'var(--booking)';
        const pn = b.platform === 'airbnb' ? 'Airbnb' : 'Booking.com';
        const other = isOut ? `Arrivé le ${fmtShort(b.ci)}` : `Repart le ${fmtShort(b.co)}`;
        html += `<div class="task-row">
          <span class="task-type ${isOut?'out':'in'}">${isOut?'DÉPART':'ARRIVÉE'}</span>
          <div><div class="task-name">${b.name}</div>
          <div class="task-detail">${other} · ${b.nights} nuit${b.nights>1?'s':''}</div>
          <div class="task-plat" style="color:${pc}">${pn}</div></div>
        </div>`;
      });
      html += '</div>';
    });
  }
  if (errors.length > 0) html += `<button class="retry-btn" onclick="loadAll()">↺ Réessayer</button>`;
  document.getElementById('menage-content').innerHTML = html;
}

function renderReservations(errors=[]) {
  const today = new Date(); today.setHours(0,0,0,0);
  const upcoming = STATE.bookings.filter(b => new Date(b.co+'T12:00:00') >= today);
  const past = STATE.bookings.filter(b => new Date(b.co+'T12:00:00') < today);
  let html = '';
  if (errors.length) html += errors.map(e => `<div class="error-box">⚠️ ${e}</div>`).join('');
  if (!upcoming.length && !past.length) html += '<div class="empty-state">Aucune réservation trouvée.</div>';
  if (upcoming.length) { html += `<div class="section-title">À venir (${upcoming.length})</div>`; html += upcoming.map(b => rvCard(b)).join(''); }
  if (past.length) { html += `<div class="section-title">Passées</div>`; html += past.slice(0,5).map(b => rvCard(b,true)).join(''); }
  document.getElementById('reserv-content').innerHTML = html;
}

function rvCard(b, dim=false) {
  const pc = b.platform==='airbnb'?'#FF5A5F':'var(--booking)';
  const pn = b.platform==='airbnb'?'Airbnb':'Booking.com';
  return `<div class="reserv-card" style="${dim?'opacity:0.5':''}">
    <div class="rv-top"><div class="rv-plat"><div class="plat-dot" style="background:${pc}"></div>${pn}</div><span class="rv-confirmed">Confirmé</span></div>
    <div class="rv-name">${b.name}</div><div class="rv-nights">${b.nights} nuit${b.nights>1?'s':''}</div>
    <div class="rv-dates">
      <div class="rv-date"><div class="rv-date-lbl">Arrivée</div><div class="rv-date-val">${fmtShort(b.ci)}</div><div class="rv-date-day">${fmtDow(b.ci)}</div></div>
      <div class="rv-date"><div class="rv-date-lbl">Départ</div><div class="rv-date-val">${fmtShort(b.co)}</div><div class="rv-date-day">${fmtDow(b.co)}</div></div>
    </div></div>`;
}

function getDayStatus(ds) {
  const d = new Date(ds + 'T12:00:00');
  const booked = STATE.bookings.filter(b => d >= new Date(b.ci+'T12:00:00') && d < new Date(b.co+'T12:00:00'));
  const a = booked.some(b => b.platform==='airbnb'), bk = booked.some(b => b.platform==='booking');
  if (a&&bk) return 'both'; if (a) return 'airbnb'; if (bk) return 'booking'; return '';
}

function renderCalendar() {
  document.getElementById('cal-title').textContent = MONTHS[STATE.calMonth] + ' ' + STATE.calYear;
  const today = new Date(); today.setHours(0,0,0,0);
  let html = DAYS_SHORT.map(d => `<div class="cal-dname">${d}</div>`).join('');
  let dow = new Date(STATE.calYear, STATE.calMonth, 1).getDay();
  dow = dow===0?6:dow-1;
  for (let i=0;i<dow;i++) html += `<div class="cal-cell"></div>`;
  const total = new Date(STATE.calYear, STATE.calMonth+1, 0).getDate();
  for (let d=1;d<=total;d++) {
    const ds = `${STATE.calYear}-${String(STATE.calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const cD = new Date(ds+'T12:00:00');
    const isToday = cD.getTime()===today.getTime(), isPast = cD<today;
    const st = STATE.loaded ? getDayStatus(ds) : '';
    const dotC = st==='airbnb'?'#FF5A5F':st==='booking'?'var(--booking)':st==='both'?'#7B6CF6':'';
    html += `<div class="cal-cell ${st}${isPast&&!isToday?' past':''}${isToday?' today':''}">
      <span style="font-size:12px">${d}</span>
      ${dotC?`<div class="cell-dot" style="background:${dotC}"></div>`:''}
    </div>`;
  }
  document.getElementById('cal-grid').innerHTML = html;
}

function changeMonth(dir) {
  STATE.calMonth += dir;
  if (STATE.calMonth>11){STATE.calMonth=0;STATE.calYear++;}
  if (STATE.calMonth<0){STATE.calMonth=11;STATE.calYear--;}
  renderCalendar();
}

function showTab(name, el) {
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  document.getElementById(name).classList.add('active');
  if(el) el.classList.add('active');
}

// Sécurité : si le chargement dépasse 15s, on affiche quand même l'app
setTimeout(hideSplash, 15000);

renderCalendar();
loadAll();
</script>
