<style>
:root{--airbnb:#FF5A5F;--booking:#003B95;--gold:#D4AF37;--bg:#F7F6F3;--card:#fff;--text:#1A1A1A;--text2:#888;--text3:#BBB;--border:rgba(0,0,0,0.08);--r:16px;--ok:#2D9B6F;--ok-bg:#EAF5EF;--warn:#C47D00;--warn-bg:#FFF5E0;--sb:env(safe-area-inset-bottom,0px);}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{font-family:'DM Sans',-apple-system,sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column;max-width:480px;margin:0 auto;}

/* SPLASH */
#splash{position:fixed;inset:0;z-index:9999;background:#1A1A1A;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity 0.5s;}
#splash.hide{opacity:0;pointer-events:none;}
.sp-logo{width:80px;height:80px;border-radius:20px;margin-bottom:20px;}
.sp-title{font-size:26px;font-weight:600;color:#fff;letter-spacing:0.15em;}
.sp-sub{font-size:13px;color:var(--gold);margin-top:6px;letter-spacing:0.08em;}
.sp-status{font-size:12px;color:rgba(255,255,255,0.4);margin-top:30px;}
.sp-loader{margin-top:12px;display:flex;gap:6px;}
.sp-dot{width:6px;height:6px;border-radius:50%;background:var(--gold);animation:sdot 1.2s infinite;}
.sp-dot:nth-child(2){animation-delay:.2s;}.sp-dot:nth-child(3){animation-delay:.4s;}
@keyframes sdot{0%,80%,100%{opacity:0.2}40%{opacity:1}}

/* TOPBAR */
.topbar{background:#1A1A1A;padding:52px 20px 14px;flex-shrink:0;}
.tb-inner{display:flex;align-items:center;justify-content:space-between;}
.tb-brand{display:flex;align-items:center;gap:10px;}
.tb-logo{width:32px;height:32px;border-radius:8px;}
.tb-name{font-size:16px;font-weight:600;color:#fff;letter-spacing:0.06em;}
.tb-sub{font-size:11px;color:var(--gold);margin-top:1px;}
.sync-pill{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,0.1);border-radius:20px;padding:6px 13px;cursor:pointer;border:none;font-family:inherit;}
.sync-pill:active{background:rgba(255,255,255,0.18);}
.sdot{width:7px;height:7px;border-radius:50%;background:#4CAF50;transition:background .3s;}
.sdot.loading{background:var(--gold);animation:blink 1s infinite;}
.sdot.err{background:var(--airbnb);}
.stext{font-size:11px;color:rgba(255,255,255,0.7);}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* LAYOUT */
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px 16px calc(76px + var(--sb));}
.section{display:none;animation:fi .2s;}
.section.active{display:block;}
@keyframes fi{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}

/* BOTTOM NAV */
.bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#fff;border-top:1px solid var(--border);display:flex;padding-bottom:var(--sb);z-index:100;box-shadow:0 -2px 16px rgba(0,0,0,0.06);}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;padding:10px 4px 8px;cursor:pointer;color:var(--text3);border:none;background:none;font-family:inherit;}
.ni.active{color:var(--text);}
.ni-icon{font-size:21px;line-height:1;margin-bottom:3px;}
.ni-label{font-size:10px;font-weight:500;}
.ni.active .ni-label{font-weight:700;}

/* LOADING / ERROR */
.loading{text-align:center;padding:60px 20px;}
.spinner{width:30px;height:30px;border:2.5px solid var(--border);border-top-color:var(--text);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 14px;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading p{font-size:13px;color:var(--text2);}
.loading small{font-size:11px;color:var(--text3);display:block;margin-top:6px;}
.ebox{background:#FFF0F0;border:1px solid rgba(255,90,95,.2);border-radius:12px;padding:14px;font-size:13px;color:#CC2222;margin-bottom:12px;line-height:1.6;}
.retry{width:100%;margin-top:10px;padding:11px;background:var(--text);color:#fff;border:none;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;}

/* CARDS */
.sec-title{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.08em;margin:20px 0 10px;}
.sec-title:first-child{margin-top:0;}

.menage-hdr{background:#1A1A1A;border-radius:var(--r);padding:18px 20px;margin-bottom:14px;display:flex;align-items:center;gap:14px;}
.menage-hdr h2{font-size:16px;font-weight:600;color:#fff;}
.menage-hdr p{font-size:12px;color:rgba(255,255,255,.45);margin-top:3px;}

.tcard{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;margin-bottom:10px;}
.tcard-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.tcard-date{font-size:13px;font-weight:600;}
.urg{font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px;}
.urg.today{background:#FFE8E8;color:#CC2222;}
.urg.tomorrow{background:var(--warn-bg);color:var(--warn);}
.urg.soon{background:#EEF2FF;color:#4F5BD5;}
.urg.ok{background:var(--ok-bg);color:var(--ok);}
.trow{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-top:1px solid var(--border);}
.ttype{font-size:10px;font-weight:700;padding:3px 8px;border-radius:5px;letter-spacing:.05em;flex-shrink:0;margin-top:2px;}
.ttype.out{background:#FFE8E8;color:#CC2222;}
.ttype.in{background:#E8F0FF;color:var(--booking);}
.tname{font-size:14px;font-weight:600;}
.tdetail{font-size:12px;color:var(--text2);margin-top:2px;}
.tplat{font-size:11px;font-weight:600;margin-top:3px;}

.rcard{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:10px;}
.rcard-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.rplat{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:600;}
.pdot{width:8px;height:8px;border-radius:50%;}
.rconf{font-size:11px;font-weight:500;padding:3px 9px;border-radius:20px;background:var(--ok-bg);color:var(--ok);}
.rname{font-size:17px;font-weight:600;margin-bottom:3px;}
.rnights{font-size:13px;color:var(--text2);}
.rdates{display:flex;margin-top:12px;border:1px solid var(--border);border-radius:10px;overflow:hidden;}
.rdate{flex:1;padding:10px 12px;}
.rdate:first-child{border-right:1px solid var(--border);}
.rdlbl{font-size:10px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px;}
.rdval{font-size:15px;font-weight:600;}
.rddow{font-size:11px;color:var(--text2);margin-top:1px;}

/* CALENDAR */
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.cal-btn{width:36px;height:36px;border-radius:50%;border:1px solid var(--border);background:var(--card);cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;color:var(--text2);}
.cal-mo{font-size:16px;font-weight:600;}
.cal-leg{display:flex;gap:12px;margin-bottom:12px;flex-wrap:wrap;}
.leg{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text2);}
.ldot{width:9px;height:9px;border-radius:2px;}
.cal-wrap{background:var(--card);border-radius:var(--r);padding:10px 8px;border:1px solid var(--border);}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:0;}
.cdname{text-align:center;font-size:10px;font-weight:600;color:var(--text2);padding:0 0 10px;}
.ccell{position:relative;display:flex;flex-direction:column;align-items:center;padding:6px 0 22px;min-height:52px;}
.ccell .cnum{font-size:13px;font-weight:500;color:var(--text);width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:50%;z-index:2;position:relative;}
.ccell.today .cnum{background:#1A1A1A;color:#fff;font-weight:700;}
.ccell.past .cnum{color:var(--text3);}
.cbar{position:absolute;bottom:6px;left:0;right:0;height:18px;display:flex;align-items:center;padding:0 2px;}
.cbar-inner{height:14px;border-radius:0;width:100%;display:flex;align-items:center;overflow:hidden;}
.cbar-inner.airbnb{background:#FFD6D7;}
.cbar-inner.booking{background:#C8D8F5;}
.cbar-inner.both{background:#E0D0FF;}
.cbar-inner.start{border-radius:7px 0 0 7px;margin-left:4px;}
.cbar-inner.end{border-radius:0 7px 7px 0;margin-right:4px;}
.cbar-inner.solo{border-radius:7px;margin:0 4px;}
.cbar-label{font-size:9px;font-weight:700;padding-left:5px;white-space:nowrap;overflow:hidden;color:#555;}
.cbar-label.airbnb{color:#CC2222;}
.cbar-label.booking{color:#003B95;}
.empty-state{text-align:center;padding:50px 20px;color:var(--text2);font-size:14px;line-height:1.6;}
</style>
</head>

  <button class="ni" onclick="showTab('calendar',this)"><div class="ni-icon">📅</div><div class="ni-label">Calendrier</div></button>

<script>
const PROXY = 'https://script.google.com/macros/s/AKfycbzTqTR4uyDUyEfoHMc67rN2ytkMOObRkl5Oh4GrDmCefTKf2QDrMN5Ak7MkLnY5OO0pRA/exec';
const AIRBNB_URL = 'https://www.airbnb.fr/calendar/ical/1663980886187139384.ics?t=4d5885c92ddf442799a7228450482e29';
const BOOKING_URL = 'https://ical.booking.com/v1/export?t=0a1b5a73-607c-4c86-ac71-1f3b3bab5c15';
const MONTHS = ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
const DAYS = ['L','M','M','J','V','S','D'];
const DAYS_FR = ['lundi','mardi','mercredi','jeudi','vendredi','samedi','dimanche'];
let S = {bk:[], calM:new Date().getMonth(), calY:new Date().getFullYear(), loaded:false};

async function fetchIcal(url, platform) {
  const proxyUrl = PROXY + '?url=' + encodeURIComponent(url);
  const res = await fetch(proxyUrl, {signal: AbortSignal.timeout(15000)});
  if (!res.ok) throw new Error('Erreur HTTP ' + res.status);
  const text = await res.text();
  if (!text.includes('BEGIN:VCALENDAR')) throw new Error('Format iCal invalide');
  return parseICS(text, platform);
}

function parseICS(text, platform) {
  const evts = [];
  const blocks = text.split('BEGIN:VEVENT');
  for (let i = 1; i < blocks.length; i++) {
    const b = blocks[i];
    const get = k => { const m = b.match(new RegExp(k+'[^:]*:([^\r\n]+)')); return m?m[1].trim():''; };
    const dtstart=get('DTSTART'), dtend=get('DTEND'), summary=get('SUMMARY'), status=get('STATUS');
    if (!dtstart||!dtend) continue;
    // Airbnb: ignorer les blocages internes
    if (platform==='airbnb') {
      const SKIP_AIR=['Not available','Airbnb (Not available)','Blocked','Unavailable'];
      if (SKIP_AIR.some(s=>summary.includes(s))) continue;
    }
    // Booking: "CLOSED - Not available" = vraie réservation, on la garde avec label propre
    const displayName = (platform==='booking' && summary.includes('CLOSED')) ? 'Réservation Booking' : (summary||'Réservation');
    const pd = s => {
      const c=s.replace(/T.*/,'').replace(/-/g,'');
      if(c.length<8) return null;
      return new Date(c.slice(0,4)+'-'+c.slice(4,6)+'-'+c.slice(6,8)+'T12:00:00');
    };
    const ci=pd(dtstart), co=pd(dtend);
    if(!ci||!co||isNaN(ci)||isNaN(co)) continue;
    const nights=Math.round((co-ci)/86400000);
    if(nights<=0) continue;
    evts.push({platform, name:displayName, ci:ci.toISOString().slice(0,10), co:co.toISOString().slice(0,10), nights, status:status==='CANCELLED'?'cancelled':'confirmed'});
  }
  return evts;
}

async function loadAll() {
  const dot=document.getElementById('sdot'), txt=document.getElementById('stext');
  const sp=document.getElementById('sp-status');
  dot.className='sdot loading'; txt.textContent='…';
  document.getElementById('mc').innerHTML='<div class="loading"><div class="spinner"></div><p>Connexion aux calendriers…</p><small>Via votre proxy sécurisé</small></div>';
  document.getElementById('rc').innerHTML='<div class="loading"><div class="spinner"></div><p>Chargement…</p></div>';

  let ab=[], bk=[], errors=[];
  try {
    if(sp) sp.textContent='Airbnb…';
    ab = await fetchIcal(AIRBNB_URL,'airbnb');
  } catch(e) { errors.push('Airbnb : '+e.message); }
  try {
    if(sp) sp.textContent='Booking.com…';
    bk = await fetchIcal(BOOKING_URL,'booking');
  } catch(e) { errors.push('Booking : '+e.message); }

  S.bk=[...ab,...bk].filter(b=>b.status!=='cancelled').sort((a,b)=>new Date(a.ci)-new Date(b.ci));
  S.loaded=true;
  dot.className=errors.length===2?'sdot err':'sdot';
  txt.textContent=errors.length===2?'Erreur':new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
  renderMenage(errors); renderReservations(errors); renderCalendar();
  hideSplash();
}

function hideSplash(){const s=document.getElementById('splash');if(s){s.classList.add('hide');setTimeout(()=>s.remove(),600);}}

const fmtLong=ds=>new Date(ds+'T12:00:00').toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'});
const fmtShort=ds=>new Date(ds+'T12:00:00').toLocaleDateString('fr-FR',{day:'numeric',month:'short'});
const fmtDow=ds=>{const d=new Date(ds+'T12:00:00');return DAYS_FR[d.getDay()===0?6:d.getDay()-1];};

function urgency(ds){
  const today=new Date();today.setHours(0,0,0,0);
  const diff=Math.round((new Date(ds+'T12:00:00')-today)/86400000);
  if(diff===0) return {c:'today',t:"Auj. m\u00eame"};
  if(diff===1) return {c:'tomorrow',t:'Demain'};
  if(diff<=5) return {c:'soon',t:'Dans '+diff+' j'};
  return {c:'ok',t:'J+'+diff};
}

function renderMenage(errors=[]){
  const today=new Date();today.setHours(0,0,0,0);
  const in60=new Date(today);in60.setDate(today.getDate()+60);
  const tasks={};
  S.bk.forEach(b=>{
    const coD=new Date(b.co+'T12:00:00'),ciD=new Date(b.ci+'T12:00:00');
    if(coD>=today&&coD<=in60){if(!tasks[b.co])tasks[b.co]=[];tasks[b.co].push({type:'out',b});}
    if(ciD>=today&&ciD<=in60){if(!tasks[b.ci])tasks[b.ci]=[];tasks[b.ci].push({type:'in',b});}
  });
  const dates=Object.keys(tasks).sort();
  let html='';
  if(errors.length) html+=errors.map(e=>`<div class="ebox">⚠️ ${e}</div>`).join('');
  if(!dates.length&&!errors.length) html='<div class="empty-state">✓ Aucun ménage prévu<br>dans les 60 prochains jours.</div>';
  dates.forEach(ds=>{
    const u=urgency(ds),dl=fmtLong(ds);
    html+=`<div class="tcard"><div class="tcard-top"><span class="tcard-date">${dl.charAt(0).toUpperCase()+dl.slice(1)}</span><span class="urg ${u.c}">${u.t}</span></div>`;
    tasks[ds].forEach(t=>{
      const {type,b}=t,isOut=type==='out';
      const pc=b.platform==='airbnb'?'#FF5A5F':'var(--booking)';
      const pn=b.platform==='airbnb'?'Airbnb':'Booking.com';
      const other=isOut?`Arrivé le ${fmtShort(b.ci)}`:`Repart le ${fmtShort(b.co)}`;
      html+=`<div class="trow"><span class="ttype ${isOut?'out':'in'}">${isOut?'DÉPART':'ARRIVÉE'}</span>
        <div><div class="tname">${b.name}</div><div class="tdetail">${other} · ${b.nights} nuit${b.nights>1?'s':''}</div>
        <div class="tplat" style="color:${pc}">${pn}</div></div></div>`;
    });
    html+='</div>';
  });
  if(errors.length) html+=`<button class="retry" onclick="loadAll()">↺ Réessayer</button>`;
  document.getElementById('mc').innerHTML=html;
}

function renderReservations(errors=[]){
  const today=new Date();today.setHours(0,0,0,0);
  const up=S.bk.filter(b=>new Date(b.co+'T12:00:00')>=today);
  const past=S.bk.filter(b=>new Date(b.co+'T12:00:00')<today);
  let html='';
  if(errors.length) html+=errors.map(e=>`<div class="ebox">⚠️ ${e}</div>`).join('');
  if(!up.length&&!past.length) html='<div class="empty-state">Aucune réservation trouvée.</div>';
  if(up.length){html+=`<div class="sec-title">À venir (${up.length})</div>`;html+=up.map(b=>rvCard(b)).join('');}
  if(past.length){html+=`<div class="sec-title">Passées</div>`;html+=past.slice(0,5).map(b=>rvCard(b,true)).join('');}
  document.getElementById('rc').innerHTML=html;
}

function rvCard(b,dim=false){
  const pc=b.platform==='airbnb'?'#FF5A5F':'var(--booking)';
  const pn=b.platform==='airbnb'?'Airbnb':'Booking.com';
  return `<div class="rcard" style="${dim?'opacity:.5':''}">
    <div class="rcard-top"><div class="rplat"><div class="pdot" style="background:${pc}"></div>${pn}</div><span class="rconf">Confirmé</span></div>
    <div class="rname">${b.name}</div><div class="rnights">${b.nights} nuit${b.nights>1?'s':''}</div>
    <div class="rdates">
      <div class="rdate"><div class="rdlbl">Arrivée</div><div class="rdval">${fmtShort(b.ci)}</div><div class="rddow">${fmtDow(b.ci)}</div></div>
      <div class="rdate"><div class="rdlbl">Départ</div><div class="rdval">${fmtShort(b.co)}</div><div class="rddow">${fmtDow(b.co)}</div></div>
    </div></div>`;
}

function getDaySt(ds){
  const d=new Date(ds+'T12:00:00');
  const bk=S.bk.filter(b=>d>=new Date(b.ci+'T12:00:00')&&d<new Date(b.co+'T12:00:00'));
  const a=bk.some(b=>b.platform==='airbnb'),bv=bk.some(b=>b.platform==='booking');
  if(a&&bv)return'both';if(a)return'airbnb';if(bv)return'booking';return'';
}

function getBookingsForDay(ds){
  const d=new Date(ds+'T12:00:00');
  return S.bk.filter(b=>d>=new Date(b.ci+'T12:00:00')&&d<new Date(b.co+'T12:00:00'));
}

function renderCalendar(){
  document.getElementById('cal-title').textContent=MONTHS[S.calM]+' '+S.calY;
  const today=new Date();today.setHours(0,0,0,0);
  let html=DAYS.map(d=>`<div class="cdname">${d}</div>`).join('');
  let dow=new Date(S.calY,S.calM,1).getDay();dow=dow===0?6:dow-1;
  for(let i=0;i<dow;i++) html+=`<div class="ccell"></div>`;
  const tot=new Date(S.calY,S.calM+1,0).getDate();
  for(let d=1;d<=tot;d++){
    const ds=`${S.calY}-${String(S.calM+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const cD=new Date(ds+'T12:00:00');
    const isT=cD.getTime()===today.getTime(),isP=cD<today;
    const bookings=S.loaded?getBookingsForDay(ds):[];
    const hasAir=bookings.some(b=>b.platform==='airbnb');
    const hasBk=bookings.some(b=>b.platform==='booking');
    const plat=hasAir&&hasBk?'both':hasAir?'airbnb':hasBk?'booking':'';
    
    let barHtml='';
    if(plat&&S.loaded){
      // Find the main booking for this day
      const mainB=bookings[0];
      const isStart=mainB&&ds===mainB.ci;
      const isEnd=mainB&&ds===new Date(new Date(mainB.co+'T12:00:00').getTime()-86400000).toISOString().slice(0,10);
      const cls=isStart&&isEnd?'solo':isStart?'start':isEnd?'end':'';
      const shortName=mainB?mainB.name.split(' ')[0]:'';
      barHtml=`<div class="cbar"><div class="cbar-inner ${plat} ${cls}">${isStart?`<span class="cbar-label ${plat}">${shortName}</span>`:''}</div></div>`;
    }
    
    html+=`<div class="ccell${isP&&!isT?' past':''}${isT?' today':''}">
      <span class="cnum">${d}</span>
      ${barHtml}
    </div>`;
  }
  document.getElementById('cal-grid').innerHTML=html;
}

function chMo(d){S.calM+=d;if(S.calM>11){S.calM=0;S.calY++;}if(S.calM<0){S.calM=11;S.calY--;}renderCalendar();}

function showTab(name,el){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.ni').forEach(n=>n.classList.remove('active'));
  document.getElementById(name).classList.add('active');
  if(el) el.classList.add('active');
}

setTimeout(hideSplash, 20000);
renderCalendar();
loadAll();
</script>
